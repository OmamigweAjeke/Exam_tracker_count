<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Countdown</title>
    <link rel="stylesheet" href="style.css">
    <!-- Link the Manifest file -->
    <link rel="manifest" href="manifest.json">

    <!-- Register the Service Worker script via an inline script tag -->
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker Registered!', reg))
          .catch(err => console.log('Service Worker registration failed: ', err));
        });
      }
    </script>
    
    <!-- OneSignal Cloud Notification Engine -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignal = window.OneSignal || [];
        OneSignal.push(function() {
            OneSignal.init({
                appId: "cb6598dc-1fd6-4d0a-8356-0cf2adb50f90",
                safari_web_id: "web.onesignal.auto.20cc36d3-e742-47b9-8fc8-37c27a32926f",
                notifyButton: {
                    enable: false, /* Keeps the messy red bell icon hidden for a clean look */
                },
            });
        });
    </script>
</head>
    
<body>

  <div class="app-container">
      <button id="settings-btn" onclick="toggleSettings()">⚙️ Edit Target</button>

      <div id="settings-panel" class="hidden">
          <h2>Tracker Settings</h2>
          <!-- 1. The Countdown Title Input -->
          <label for="input-title">What are you tracking?</label>
          <input type="text" id="input-title" placeholder="e.g., Final Exams">
          
          <!-- 2. The Main Target Exam Date Picker -->
          <label for="input-date">Target Exam Date & Time:</label>
          <input type="datetime-local" id="input-date">
          
          <!-- 3. THE FIXED REMINDER ALARM BOX (The piece that was missing!) -->
          <label for="input-alarm-date">Set Custom Study Reminder Alert:</label>
          <input type="datetime-local" id="input-alarm-date">
          
          <!-- 4. Save Button Trigger -->
          <button id="save-btn" onclick="saveSettings()">Save Target & Arm Alarm</button>
      </div>

      <h2 id="app-title">Final Exams 📚</h2>
      <p id="target-date-display">Loading date...</p>

      <div id="countdown-box">
          <div class="flip-card"><div class="card-number" id="days">00</div><div class="card-label">Days</div></div>
          <div class="flip-card"><div class="card-number" id="hours">00</div><div class="card-label">Hours</div></div>
          <div class="flip-card"><div class="card-number" id="minutes">00</div><div class="card-label">Mins</div></div>
      </div>

      <p class="exam-wish-text">Wishing you success in your Exams ✨</p>

      <hr>

      <div class="verse-container">
          <h3>Daily Bread 🙏</h3>
          <p id="verse-text">Loading today's encouraging word...</p>
          <span id="verse-ref"></span>
      </div>

      <footer class="app-footer">
          Designed by <span class="designer-name">Mamus</span>
      </footer>
  </div>

    <script src="app.js"></script>
</body>
</html>
